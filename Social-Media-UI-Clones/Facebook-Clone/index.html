<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fb-main">
        <div class="fb-left">
            <h1>facebook</h1>
            <h2>Facebook helps you connect and share with the people in your life.</h2>
        </div>
        <div class="fb-right">
            <div class="fb-box">
                <form action="https://www.facebook.com" method="GET">
                    <input type="text" placeholder="Email address or phone number" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="fb-login-btn">Log In</button>
                </form>
                <a href="#" class="fb-forgot">Forgotten password?</a>
                <hr>
                <button class="fb-new-btn">Create new account</button>
            </div>
        </div>
    </div>
</body>
</html>
