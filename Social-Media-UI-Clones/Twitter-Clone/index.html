<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="x-container">
        <div class="x-logo">
            <i class="fa-brands fa- x"></i><span>X</span>
        </div>
        <h1>Happening now</h1>
        <h2>Join today.</h2>
        <div class="x-form-box">
            <form action="https://x.com" method="GET">
                <input type="text" placeholder="Phone, email, or username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="x-next-btn">Log In</button>
            </form>
            <a href="#" class="x-forgot">Forgot password?</a>
        </div>
    </div>
</body>
</html>
